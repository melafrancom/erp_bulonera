<!-- ===== SECCIÓN: Información del Cliente ===== -->
<div class="bg-white rounded-xl shadow-sm border border-gray-200 mb-6 relative z-20">
  <div class="px-6 py-4 border-b border-gray-200 bg-gradient-to-r from-gray-50 to-white rounded-t-xl">
    <h3 class="text-base font-semibold text-gray-900 flex items-center gap-2">
      <span class="inline-flex items-center justify-center w-7 h-7 bg-blue-100 rounded-lg">
        <i data-lucide="user" class="w-4 h-4 text-blue-600"></i>
      </span>
      {{ section_title|default:"Cliente" }}
    </h3>
  </div>
  <div class="p-6">
    <div class="space-y-4">
      <!-- Selector de modo -->
      <div class="flex gap-2 mb-3">
        <button type="button"
                @click="setCustomerMode('anonymous')"
                :class="customerMode === 'anonymous'
                  ? 'bg-blue-600 text-white border-blue-600'
                  : 'bg-white text-gray-700 border-gray-300 hover:bg-gray-50'"
                class="flex-1 px-3 py-2 text-sm border rounded-lg transition font-medium">
          Consumidor Final
        </button>
        <button type="button"
                @click="setCustomerMode('existing')"
                :class="customerMode === 'existing'
                  ? 'bg-blue-600 text-white border-blue-600'
                  : 'bg-white text-gray-700 border-gray-300 hover:bg-gray-50'"
                class="flex-1 px-3 py-2 text-sm border rounded-lg transition font-medium">
          Cliente Registrado
        </button>
        <button type="button"
                @click="setCustomerMode('new')"
                :class="customerMode === 'new'
                  ? 'bg-blue-600 text-white border-blue-600'
                  : 'bg-white text-gray-700 border-gray-300 hover:bg-gray-50'"
                class="flex-1 px-3 py-2 text-sm border rounded-lg transition font-medium">
          Cliente Nuevo
        </button>
      </div>

      <!-- Modo: Consumidor Final -->
      <div x-show="customerMode === 'anonymous'" x-transition x-cloak>
        <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-lg border border-gray-200">
          <i data-lucide="user" class="w-5 h-5 text-gray-400 flex-shrink-0"></i>
          <p class="text-sm text-gray-600">
            La operación se registrará como <span class="font-medium">Consumidor Final</span>.
          </p>
        </div>
      </div>

      <!-- Modo: Cliente Registrado -->
      <div x-show="customerMode === 'existing'" x-transition x-cloak>
        <div class="relative" x-show="!selectedCustomer">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i data-lucide="search" class="w-4 h-4 text-gray-400"></i>
          </div>
          <input type="text"
                  x-model="customerSearchQuery"
                  @input.debounce.300ms="searchCustomers()"
                  @focus="showCustomerResults = true"
                  @click.outside="showCustomerResults = false"
                  placeholder="Buscar por nombre o CUIT..."
                  class="form-input pl-10"
                  autocomplete="off">

          <div x-show="customerSearching" class="absolute right-3 top-1/2 -translate-y-1/2" x-cloak>
            <svg class="animate-spin h-4 w-4 text-blue-600" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
          </div>

          <!-- Resultados de búsqueda -->
          <div x-show="showCustomerResults && customerResults.length > 0"
                x-transition
                x-cloak
                class="absolute z-50 w-full mt-1 bg-white border border-gray-200 rounded-lg shadow-lg max-h-60 overflow-y-auto">
            <template x-for="c in customerResults" :key="c.id">
              <button type="button"
                      @click="selectCustomer(c)"
                      class="w-full text-left px-4 py-2.5 hover:bg-blue-50 transition border-b border-gray-100 last:border-0">
                <p class="text-sm font-medium text-gray-900" x-text="c.business_name"></p>
                <p class="text-xs text-gray-500" x-text="c.cuit_cuil || 'Sin CUIT'"></p>
              </button>
            </template>
          </div>
        </div>

        <!-- Cliente seleccionado -->
        <div x-show="selectedCustomer" x-transition x-cloak class="flex items-center justify-between p-3 bg-blue-50 rounded-lg border border-blue-200">
          <div class="flex items-center gap-2">
            <i data-lucide="user-check" class="w-4 h-4 text-blue-600"></i>
            <div>
              <p class="text-sm font-medium text-blue-900" x-text="selectedCustomer?.business_name"></p>
              <p class="text-xs text-blue-700" x-text="selectedCustomer?.cuit_cuil || 'Sin CUIT registrado'"></p>
            </div>
          </div>
          <button type="button" @click="setCustomerMode(customerMode)" class="text-blue-400 hover:text-blue-600">
            <i data-lucide="x" class="w-4 h-4"></i>
          </button>
        </div>
      </div>

      <!-- Modo: Cliente Nuevo -->
      <div x-show="customerMode === 'new'" x-transition x-cloak class="space-y-3">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <div class="sm:col-span-2">
            <label class="block text-xs font-medium text-gray-700 mb-1">Nombre / Razón Social <span class="text-red-500">*</span></label>
            <input type="text" x-model="newCustomer.name" class="form-input">
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-700 mb-1">Teléfono</label>
            <input type="tel" x-model="newCustomer.phone" class="form-input">
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-700 mb-1">Email</label>
            <input type="email" x-model="newCustomer.email" class="form-input">
          </div>
          <div class="sm:col-span-2">
            <label class="block text-xs font-medium text-gray-700 mb-1">CUIT / CUIL / DNI <span class="text-gray-400 font-normal">(Requerido para guardar)</span></label>
            <div class="flex gap-2">
              <input type="text" x-model="newCustomer.cuit" maxlength="11" placeholder="Ej: 20123456789" class="flex-1 form-input font-mono outline-none">
              <button type="button" @click="verifyAfip()" :disabled="isVerifyingAfip || !newCustomer.cuit"
                      class="px-3 py-2 bg-gray-100 text-gray-700 hover:bg-gray-200 rounded-lg text-xs font-medium transition flex-shrink-0 flex items-center gap-1.5 disabled:opacity-50 border border-gray-200 outline-none focus:ring-2 focus:ring-gray-300">
                <i data-lucide="search" class="w-4 h-4" x-show="!isVerifyingAfip"></i>
                <i data-lucide="loader-2" class="w-4 h-4 animate-spin" x-show="isVerifyingAfip" x-cloak></i>
                <span>AFIP</span>
              </button>
            </div>
          </div>
        </div>
        <div class="mt-3 flex items-center justify-between">
          <p class="text-xs text-gray-500 flex items-start gap-1.5">
            <i data-lucide="info" class="w-3.5 h-3.5 mt-0.5 flex-shrink-0"></i>
            Opcional: Podés guardar el cliente ahora o se creará automáticamente al procesar la operación.
          </p>
          <button type="button" @click="registerCustomer()" :disabled="isSubmittingCustomer"
                  class="inline-flex items-center gap-2 px-4 py-2 bg-blue-50 text-blue-700 hover:bg-blue-100 rounded-lg text-xs font-semibold transition disabled:opacity-50 border border-blue-200">
            <i data-lucide="save" class="w-4 h-4"></i>
            <span x-text="isSubmittingCustomer ? 'Guardando...' : 'Guardar Cliente Libre'"></span>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
