<!-- Botón de Instalación PWA -->
<!-- El evento beforeinstallprompt y la lógica de instalación están en sw-register.js -->
<button
  id="install-button"
  style="display: none;"
  onclick="window.triggerInstallPrompt()"
  aria-label="Instalar la aplicación en este dispositivo"
  class="fixed bottom-20 right-4 lg:bottom-6 lg:right-6 z-50 px-5 py-3
         bg-gradient-to-r from-blue-600 to-blue-800 text-white font-semibold
         rounded-full shadow-2xl hover:from-blue-700 hover:to-blue-900
         transition-all duration-200 transform hover:scale-105
         flex items-center gap-2 text-sm">
  <!-- Ícono descarga -->
  <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 flex-shrink-0"
       fill="none" viewBox="0 0 24 24" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
  </svg>
  Instalar App
</button>
